name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: sudo apt-get install -y texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended

      - name: Compile LaTeX report
        run: |
          pdflatex -interaction=nonstopmode -output-directory=deployment final_report.tex
          pdflatex -interaction=nonstopmode -output-directory=deployment final_report.tex
          rm -f deployment/final_report.log deployment/final_report.aux deployment/final_report.out

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deployment

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
